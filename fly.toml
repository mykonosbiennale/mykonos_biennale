app = "mykonos-biennale"
primary_region = "ams"
kill_signal = "SIGTERM"

[build]

[env]
  PHX_HOST = "mykonos-biennale.fly.dev"
  PORT = "8080"

[mounts]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024