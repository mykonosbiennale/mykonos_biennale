name: Deploy to Lightsail

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build and extract release
        run: |
          docker buildx build --platform linux/amd64 --load \
            --build-arg ELIXIR_VERSION=1.19.3 \
            --build-arg OTP_VERSION=27.2.3 \
            -t mykonos-biennale-release .
          docker create --name release-extract mykonos-biennale-release
          docker cp release-extract:/app ./release-artifact
          docker rm release-extract
          tar czf release.tar.gz -C release-artifact .

      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: release.tar.gz
          target: /tmp

      - uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          command_timeout: 120s
          script: |
            set -e
            sudo rm -rf /opt/mykonos_biennale_old 2>/dev/null || true
            sudo mv /opt/mykonos_biennale /opt/mykonos_biennale_old 2>/dev/null || true
            sudo mkdir -p /opt/mykonos_biennale
            sudo tar xzf /tmp/release.tar.gz -C /opt/mykonos_biennale
            sudo cp /opt/mykonos_biennale_old/.env /opt/mykonos_biennale/.env 2>/dev/null || true
            sudo chown -R ubuntu:ubuntu /opt/mykonos_biennale
            sudo mkdir -p /data/uploads /data/thumbnails
            sudo chown -R ubuntu:ubuntu /data
            sudo systemctl restart mykonos-biennale
            sleep 5
            sudo systemctl is-active mykonos-biennale